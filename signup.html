<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup - FitZone</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="signup-page">

    <!-- Brand Logo -->
    <a href="index.html" class="auth-logo">
        FitZone
    </a>

    <div class="container">

        <div class="left-section fade-in">

            <div class="overlay"></div>

            <div class="content">
                <h1></h1>

                <p>
                    
                </p>
            </div>

        </div>

        <!-- RIGHT SIDE -->

        <div class="right-section slide-up delay-200">

            <form id="signupForm">

                <h2>Create Account</h2>

 
                <div class="input-wrapper">
                    <i class="ph-fill ph-user"></i>
                    <input type="text" id="signupUsername" placeholder="Username" required minlength="3">
                </div>

                <div class="input-wrapper">
                    <i class="ph-fill ph-envelope"></i>
                    <input type="email" id="signupEmail" placeholder="Email Address" required>
                </div>

                <div class="input-wrapper">
                    <i class="ph-fill ph-lock-key"></i>
                    <input type="password" id="signupPassword" placeholder="Password" required minlength="6">
                    <button type="button" class="icon-btn toggle-password" id="toggleSignupPassword" aria-label="Show password">
                        <i class="ph ph-eye"></i>
                    </button>
                </div>

                <div class="input-wrapper">
                    <i class="ph-fill ph-lock-key"></i>
                    <input type="password" id="confirmPassword" placeholder="Confirm Password" required minlength="6">
                </div>

                <button type="submit">
                    Create Account
                </button>

                <p>
                    Already have an account?
                    <a href="login.html">
                        Login
                    </a>
                </p>

            </form>

        </div>

    </div>

    <div id="toastContainer" class="toast-container"></div>

    <script src="js/db.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/global.js"></script>

</body>
</html>
