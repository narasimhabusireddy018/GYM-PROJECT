<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FitZone</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="login-page">

    <!-- Background Video -->
    <div class="video-bg-container">
        <video autoplay loop muted playsinline class="video-bg" id="bgVideo">
            <source src="videos/login_video.mp4" type="video/mp4">
        </video>
        <div class="video-overlay-glow"></div>
        <div class="video-overlay-dark"></div>
    </div>

    <!-- Floating Sound Control -->
    <button class="bg-sound-toggle" id="soundToggleBtn" aria-label="Toggle Background Sound">
        <i class="ph ph-speaker-slash"></i> Unmute
    </button>

    <!-- Brand Logo -->
    <a href="index.html" class="auth-logo">
        FitZone
    </a>

    <div class="container">

        <div class="left-section fade-in">

            <div class="overlay"></div>

            <div class="content">
                <h1></h1>
                <p>
                    
                    
                </p>
            </div>

        </div>

        <!-- RIGHT SIDE -->

        <div class="right-section slide-up delay-200">

            <form id="loginForm">

                <h2>Login</h2>

                <div class="input-wrapper">
                    <i class="ph-fill ph-user"></i>
                    <input type="text" id="loginUsername" placeholder="Username" required>
                </div>

                <div class="input-wrapper">
                    <i class="ph-fill ph-lock-key"></i>
                    <input type="password" id="loginPassword" placeholder="Password" required>
                    <button type="button" class="icon-btn toggle-password" id="toggleLoginPassword" aria-label="Show password">
                        <i class="ph ph-eye"></i>
                    </button>
                </div>

                <div class="remember">

                    <label>
                        <input type="checkbox">
                        Remember Me
                    </label>

                </div>

                <button type="submit">
                    Login
                </button>

                <p>
                    Don't have an account?
                    <a href="signup.html">
                        Sign Up
                    </a>
                </p>

            </form>

        </div>

    </div>

    <div id="toastContainer" class="toast-container"></div>

    <script src="js/db.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/global.js"></script>

</body>
</html>
